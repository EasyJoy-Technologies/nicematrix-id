services:
  postgres:
    image: postgres:16-alpine
    container_name: nicematrix-id-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  logto:
    build:
      context: ..
      dockerfile: logto-custom/Dockerfile
    image: nicematrix-logto:latest
    container_name: nicematrix-logto
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${LOGTO_PORT}/oidc/.well-known/openid-configuration >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      ENDPOINT: ${LOGTO_ENDPOINT}
      ADMIN_ENDPOINT: ${LOGTO_ENDPOINT}
      ADMIN_DISABLE_LOCALHOST: ${LOGTO_ADMIN_DISABLE_LOCALHOST}
      COOKIE_SECRET: ${LOGTO_COOKIE_SECRET}
      PORT: ${LOGTO_PORT}
      TRUST_PROXY_HEADER: "true"
      NODE_ENV: production
    ports:
      - "3001:${LOGTO_PORT}"

volumes:
  pg_data:
